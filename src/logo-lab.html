<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Logo Lab — Galent (experimental)</title>

  <!--
    ╔══════════════════════════════════════════════════════════════════╗
    ║  LOGO LAB — experimental motion prototype. NOT production code.    ║
    ║  Cinematic hero animation of the Galent mark.                      ║
    ║  Stack: React + GSAP + SVG/CSS via CDN. No build. No Three.js.     ║
    ║                                                                    ║
    ║  SVG-shape version: the mark is rebuilt from its blob geometry so  ║
    ║  the two blocks separate as clean shapes and contour rings clip    ║
    ║  exactly inside each shape (a true cross-section of the layers).   ║
    ╚══════════════════════════════════════════════════════════════════╝
  -->

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>

  <style>
    :root { --contour: 150, 225, 255; --bg-0: #05060c; --bg-1: #0b0c18; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      background: radial-gradient(120% 90% at 50% 18%, #14122b 0%, var(--bg-1) 42%, var(--bg-0) 100%);
      color: #e8eaf2;
      font-family: "Plus Jakarta Sans", system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }
    #root { height: 100vh; height: 100dvh; }

    .scene { position: fixed; inset: 0; display: grid; place-items: center; perspective: 1200px; overflow: hidden; }
    .scene::before {
      content: ""; position: absolute; inset: -20%;
      background-image:
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
      background-size: 46px 46px;
      mask: radial-gradient(70% 60% at 50% 45%, #000 30%, transparent 78%);
      opacity: .5; pointer-events: none;
    }

    .core-glow {
      position: absolute; left: 50%; top: 50%;
      width: 60vmin; height: 60vmin; transform: translate(-50%, -50%) scale(var(--glow, .6));
      border-radius: 50%;
      background: radial-gradient(circle, rgba(150,210,255,.55) 0%, rgba(124,92,219,.25) 35%, transparent 70%);
      filter: blur(8px); opacity: var(--glow-op, 0); pointer-events: none; mix-blend-mode: screen;
    }
    .tunnel {
      position: absolute; inset: -50%;
      background: repeating-radial-gradient(circle at 50% 50%,
        rgba(var(--contour), 0) 0, rgba(var(--contour), 0) 34px,
        rgba(var(--contour), .55) 36px, rgba(var(--contour), 0) 58px);
      transform: scale(var(--t, 1)); transform-origin: 50% 50%;
      opacity: var(--tunnel-op, 0); mix-blend-mode: screen; pointer-events: none; will-change: transform;
    }

    .logo {
      width: 340px; height: 340px;
      transform: scale(var(--logo-scale, 1));
      transform-origin: 50% 50%;
      will-change: transform; overflow: visible;
      filter: drop-shadow(0 14px 50px rgba(124,92,219,.35));
    }
    .rings circle { fill: none; stroke: rgba(var(--contour), .9); stroke-width: .55; }

    .hud {
      position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%);
      display: flex; align-items: center; gap: 14px; padding: 10px 14px; border-radius: 999px;
      background: rgba(12,14,26,.6); border: 1px solid rgba(255,255,255,.1);
      backdrop-filter: blur(10px); z-index: 20; font-size: 13px;
    }
    .hud button {
      appearance: none; border: 1px solid rgba(255,255,255,.16); background: rgba(255,255,255,.06);
      color: #e8eaf2; padding: 8px 14px; min-height: 36px; border-radius: 999px; font: inherit; cursor: pointer;
      transition: background .2s ease, border-color .2s ease;
    }
    .hud button:hover { background: rgba(255,255,255,.14); border-color: rgba(255,255,255,.3); }
    .hud button:focus-visible { outline: 2px solid #8fd0ff; outline-offset: 2px; }
    .hud input[type="range"] { width: 240px; accent-color: #8fd0ff; cursor: pointer; }
    .stage {
      position: fixed; top: 22px; left: 50%; transform: translateX(-50%);
      font-family: ui-monospace, "JetBrains Mono", monospace; font-size: 12px; letter-spacing: 2px;
      text-transform: uppercase; color: rgba(232,234,242,.7); z-index: 20; pointer-events: none;
    }
    .stage b { color: #9fd6ff; }
    .badge {
      position: fixed; top: 20px; left: 22px; z-index: 20; font-family: ui-monospace, monospace;
      font-size: 11px; letter-spacing: 1.5px; color: rgba(232,234,242,.4); text-transform: uppercase;
    }
    @media (prefers-reduced-motion: reduce) { .tunnel { display: none; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useRef, useState, useCallback } = React;

    const STAGE_TEXT = {
      rest:     "01 · The mark, at rest",
      separate: "02 · The blocks part",
      reunite:  "03 · They return",
      contour:  "04 · Contours surface inside the shapes",
      densify:  "05 · Layers deepen · the mark grows",
      enter:    "06 · Entering the intelligence core",
      calm:     "07 · Stillness",
    };

    // Mark geometry (viewBox 0 0 120 120). Centre of the mark ≈ (60, 60).
    const CX = 60, CY = 60;
    // Concentric contour radii, centred on the mark — clipped to each blob.
    const RINGS = Array.from({ length: 30 }, (_, i) => 2 + i * 2.3);

    function Rings() {
      return RINGS.map((r, i) => <circle key={i} cx={CX} cy={CY} r={r} />);
    }

    function LogoLab() {
      const logo   = useRef(null);
      const gTop   = useRef(null);
      const gBot   = useRef(null);
      const ringsT = useRef(null);
      const ringsB = useRef(null);
      const tunnel = useRef(null);
      const glow   = useRef(null);
      const tlRef  = useRef(null);
      const loop   = useRef(null);

      const [stage, setStage] = useState(STAGE_TEXT.rest);
      const [playing, setPlay] = useState(true);
      const [scrub, setScrub] = useState(0);

      const updateStage = useCallback((tl) => {
        const t = tl.time(); const labels = tl.labels; let cur = "rest", best = -1;
        for (const n in labels) { if (labels[n] <= t + 0.001 && labels[n] >= best) { best = labels[n]; cur = n; } }
        setStage(STAGE_TEXT[cur] || STAGE_TEXT.rest);
      }, []);

      useEffect(() => {
        const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        const ringGroups = [ringsT.current, ringsB.current];

        // Continuous tunnel travel — revealed only in the final stage.
        loop.current = gsap.fromTo(tunnel.current, { "--t": 1 }, { "--t": 1.9, duration: 5, ease: "none", repeat: -1 });
        loop.current.pause();

        // Baselines (so CSS-var tweens start from a known value).
        gsap.set(logo.current,   { "--logo-scale": 1, opacity: 1 });
        gsap.set(tunnel.current, { "--tunnel-op": 0, "--t": 1 });
        gsap.set(glow.current,   { "--glow-op": 0, "--glow": 0.55 });
        gsap.set(ringGroups,     { opacity: 0, transformOrigin: "50% 50%", svgOrigin: CX + " " + CY, scale: 1.7 });

        const tl = gsap.timeline({
          defaults: { ease: "power3.inOut" }, paused: true,
          onUpdate() { updateStage(tl); setScrub(tl.progress() * 1000); },
        });
        tlRef.current = tl;

        // 1 — rest
        tl.addLabel("rest").to({}, { duration: 1.0 });

        // 2 — the blocks part (subtle, ~25px on screen ≈ 5 user units each)
        tl.addLabel("separate")
          .to(gTop.current, { y: -5, duration: 1.5, ease: "power2.out" }, "separate")
          .to(gBot.current, { y:  5, duration: 1.5, ease: "power2.out" }, "separate");

        // 3 — they slowly return
        tl.addLabel("reunite", "+=0.5")
          .to([gTop.current, gBot.current], { y: 0, duration: 1.6, ease: "power2.inOut" }, "reunite");

        // 4 — contours surface inside the shapes (rings fade in + contract = denser)
        tl.addLabel("contour", "+=0.25")
          .to(ringGroups, { opacity: 0.95, duration: 1.6 }, "contour")
          .to(ringGroups, { scale: 1.0, duration: 2.6, ease: "power2.out" }, "contour")
          .to(glow.current, { "--glow-op": 0.35, duration: 1.8 }, "contour");

        // 5 — layers deepen, the mark enlarges
        tl.addLabel("densify", "+=0.2")
          .to(ringGroups, { scale: 0.62, duration: 2.2, ease: "power1.inOut" }, "densify")
          .to(logo.current, { "--logo-scale": 1.4, duration: 2.2, ease: "power1.inOut" }, "densify")
          .to(glow.current, { "--glow-op": 0.6, "--glow": 0.9, duration: 2.2 }, "densify");

        // 6 — camera into the centre · contours become a tunnel
        tl.addLabel("enter", "+=0.15")
          .to(ringGroups, { scale: 0.30, duration: 3.2, ease: "power2.in" }, "enter")
          .to(logo.current, { "--logo-scale": 8.5, duration: 3.4, ease: "power2.in" }, "enter")
          .to(logo.current, { opacity: 0, duration: 1.3, ease: "power1.in" }, "enter+=2.1")
          .to(tunnel.current, { "--tunnel-op": 0.9, duration: 2.0 }, "enter+=0.6")
          .to(glow.current, { "--glow-op": 0.95, "--glow": 1.7, duration: 3.2 }, "enter")
          .add(() => { if (!reduce) loop.current.play(); }, "enter+=0.6");

        // 7 — stillness
        tl.addLabel("calm", "+=0.2")
          .to(glow.current, { "--glow-op": 0.7, duration: 1.6, ease: "sine.inOut" }, "calm")
          .to(tunnel.current, { "--tunnel-op": 0.5, duration: 1.6, ease: "sine.inOut" }, "calm");

        if (reduce) { tl.progress(1); loop.current.pause(); setPlay(false); }
        else tl.play();

        return () => { tl.kill(); if (loop.current) loop.current.kill(); };
      }, [updateStage]);

      const replay = () => { const tl = tlRef.current; if (!tl) return; if (loop.current) loop.current.pause().progress(0); tl.restart(); setPlay(true); };
      const toggle = () => { const tl = tlRef.current; if (!tl) return; if (tl.paused() || !playing) { tl.play(); setPlay(true); } else { tl.pause(); setPlay(false); } };
      const onScrub = (e) => { const tl = tlRef.current; if (!tl) return; tl.pause(); setPlay(false); tl.progress(Number(e.target.value) / 1000); setScrub(Number(e.target.value)); };

      return (
        <React.Fragment>
          <div className="badge">logo lab · experimental</div>
          <div className="stage" dangerouslySetInnerHTML={{ __html: stage.replace(/^(\d+)/, "<b>$1</b>") }} />

          <div className="scene">
            <div className="tunnel" ref={tunnel} />
            <div className="core-glow" ref={glow} />

            <svg className="logo" ref={logo} viewBox="0 0 120 120" aria-label="Galent" role="img">
              <defs>
                <radialGradient id="grad-green" cx="40%" cy="38%" r="75%">
                  <stop offset="0%"  stop-color="#5BF0C0"/>
                  <stop offset="55%" stop-color="#1ED197"/>
                  <stop offset="100%" stop-color="#10A87A"/>
                </radialGradient>
                <radialGradient id="grad-orange" cx="40%" cy="38%" r="70%">
                  <stop offset="0%"  stop-color="#FFB07A"/>
                  <stop offset="60%" stop-color="#FF7634"/>
                  <stop offset="100%" stop-color="#FF5A1F"/>
                </radialGradient>
                <radialGradient id="grad-purple" cx="42%" cy="36%" r="80%">
                  <stop offset="0%"  stop-color="#B57AE8"/>
                  <stop offset="55%" stop-color="#9B4DE0"/>
                  <stop offset="100%" stop-color="#7B2CBF"/>
                </radialGradient>
                <filter id="soft" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
                  <feGaussianBlur stdDeviation="1.1"/>
                </filter>
                {/* clip rings to the exact blob geometry */}
                <clipPath id="clip-top">
                  <ellipse cx="46" cy="44" rx="28" ry="23"/>
                  <circle  cx="80" cy="34" r="11"/>
                </clipPath>
                <clipPath id="clip-bottom">
                  <ellipse cx="58" cy="78" rx="42" ry="30"/>
                </clipPath>
              </defs>

              {/* BOTTOM block — purple body (drawn first, behind) */}
              <g ref={gBot} className="grp">
                <ellipse cx="58" cy="78" rx="42" ry="30" fill="url(#grad-purple)" filter="url(#soft)"/>
                <g ref={ringsB} className="rings" clipPath="url(#clip-bottom)"><Rings/></g>
              </g>

              {/* TOP block — green leaf + orange dot */}
              <g ref={gTop} className="grp">
                <ellipse cx="46" cy="44" rx="28" ry="23" fill="url(#grad-green)" filter="url(#soft)"/>
                <circle  cx="80" cy="34" r="11" fill="url(#grad-orange)" filter="url(#soft)"/>
                <g ref={ringsT} className="rings" clipPath="url(#clip-top)"><Rings/></g>
              </g>
            </svg>
          </div>

          <div className="hud" role="group" aria-label="Animation controls">
            <button onClick={replay}>↺ Replay</button>
            <button onClick={toggle}>{playing ? "⏸ Pause" : "▶ Play"}</button>
            <input type="range" min="0" max="1000" value={scrub} onChange={onScrub} aria-label="Scrub timeline" />
          </div>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<LogoLab />);
  </script>
</body>
</html>
