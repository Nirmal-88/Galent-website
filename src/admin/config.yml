# Decap CMS configuration for Galent.
# Schema definitions live here. Edits in the /admin/ UI write commits
# back to this GitHub repo, which triggers a Vercel redeploy.

backend:
  name: github
  repo: Nirmal-88/Galent-website
  branch: main
  base_url: https://galent-website.vercel.app
  auth_endpoint: api/auth

# Where Decap stores its drafts while editing (kept out of the live site)
publish_mode: simple
media_folder: "src/assets/images/uploads"
public_folder: "/assets/images/uploads"

site_url: https://galent-website.vercel.app
display_url: https://galent-website.vercel.app
logo_url: https://galent-website.vercel.app/assets/images/logo.png

collections:
  # ----------------------------------------------------------------------
  # KNOWLEDGE HUB — edits content/knowledge.json directly (file mode)
  # ----------------------------------------------------------------------
  - name: "knowledge"
    label: "Knowledge Hub"
    label_singular: "Hub item"
    description: "Blogs, whitepapers, and videocasts that appear on the Knowledge Hub page. Add a new item, change copy, or remove one — published changes appear live within ~1 minute."
    files:
      - name: "items"
        label: "Hub items (list)"
        file: "src/content/knowledge.json"
        description: "All items shown on the Hub page. Drag to reorder. Click an item to edit."
        fields:
          - { name: "categories", label: "Categories (do not change unless you know what you're doing)", widget: "object", collapsed: true, fields: [
              { name: "blogs",       label: "Blogs",       widget: "object", fields: [
                { name: "label",    label: "Tab label",          widget: "string" },
                { name: "ctaLabel", label: "Card CTA label",     widget: "string" }
              ]},
              { name: "whitepapers", label: "Whitepapers", widget: "object", fields: [
                { name: "label",    label: "Tab label",          widget: "string" },
                { name: "ctaLabel", label: "Card CTA label",     widget: "string" }
              ]},
              { name: "videocasts",  label: "Videocasts",  widget: "object", fields: [
                { name: "label",    label: "Tab label",          widget: "string" },
                { name: "ctaLabel", label: "Card CTA label",     widget: "string" }
              ]}
            ] }

          - label: "Items"
            name: "items"
            widget: "list"
            summary: "{{fields.kind}} · {{fields.title}}"
            fields:
              - { name: "id",         label: "Slug",          widget: "string", hint: "Lower-case, hyphens. Used as a key. e.g. why-pocs-fail" }
              - { name: "category",   label: "Category",      widget: "select",  options: ["blogs", "whitepapers", "videocasts"] }
              - { name: "kind",       label: "Kind label",    widget: "string", default: "ESSAY", hint: "Shown on the card — ESSAY, WHITEPAPER, VIDEOCAST, FIELD NOTE, BRIEF" }
              - { name: "title",      label: "Title",         widget: "string" }
              - { name: "excerpt",    label: "Excerpt",       widget: "text",   hint: "1–2 sentence preview shown on the card" }
              - { name: "domain",     label: "Domain tag",    widget: "select", options: ["industry", "delivery", "platform", "talent", "governance", "culture"] }
              - { name: "length",     label: "Length",        widget: "string", hint: "e.g. 10 MIN or 32 PAGES" }
              - { name: "author",     label: "Author / byline", widget: "string", default: "COMING SOON" }
              - { name: "href",       label: "Link target",   widget: "string", hint: "Where the card links to. e.g. knowledge/your-post.html" }
              - { name: "thumbStyle", label: "Thumb tint",    widget: "select", options: ["alt-1", "alt-2", "alt-3", "alt-4", "alt-5", "alt-6"], default: "alt-1" }
              - { name: "icon",       label: "Icon glyph",    widget: "string", required: false, hint: "Symbol shown on the thumb. ✎ ⚙ ◆ ⌘ ⊞ ◐ 📄  (leave blank for videocasts)" }
              - { name: "runtime",    label: "Runtime (videocasts only)", widget: "string", required: false, hint: "HH:MM e.g. 22:14" }

  # ----------------------------------------------------------------------
  # LEADERSHIP — About page founder cards. Lives in content/leadership.json.
  # ----------------------------------------------------------------------
  - name: "leadership"
    label: "Leadership"
    label_singular: "Leader"
    description: "The four leaders shown on the About page. Add, edit, reorder or remove."
    files:
      - name: "team"
        label: "Leadership team"
        file: "src/content/leadership.json"
        description: "Drag entries to reorder. Order in the list = order on the About page."
        fields:
          - label: "Leaders"
            name: "items"
            widget: "list"
            summary: "{{fields.name}} — {{fields.role}}"
            fields:
              - { name: "id",         label: "Slug",        widget: "string", hint: "Lower-case, hyphens. Internal key, not shown to users. e.g. jane-smith" }
              - { name: "name",       label: "Name",        widget: "string" }
              - { name: "role",       label: "Role",        widget: "string", hint: "e.g. CEO, President & COO, CTO" }
              - { name: "bio",        label: "Bio",         widget: "text",   hint: "1-2 paragraph description of their background and role at Galent" }
              - { name: "photo",      label: "Photo",       widget: "image",  media_folder: "/src/assets/images/leadership", public_folder: "assets/images/leadership", hint: "Portrait photo, ideally 4:5 aspect ratio. Will be cropped to face/torso." }
              - { name: "alt",        label: "Image alt text", widget: "string", required: false, hint: "Description for screen readers, e.g. 'Jane Smith, CEO of Galent'" }
              - { name: "connectUrl", label: "Connect URL", widget: "string", required: false, hint: "Where the Connect button links to (e.g. LinkedIn profile). Leave as # for no link." }

  # ----------------------------------------------------------------------
  # CASE STUDIES — Home page "What Gets Delivered" section. Anonymised.
  # ----------------------------------------------------------------------
  - name: "cases"
    label: "Client Outcomes"
    label_singular: "Case study"
    description: "Anonymised client wins shown on the home page. Each card has a sector tag, a one-line problem, and a metric."
    files:
      - name: "list"
        label: "Case studies"
        file: "src/content/cases.json"
        description: "Drag entries to reorder. Order in the list = order shown on the home page."
        fields:
          - label: "Case studies"
            name: "items"
            widget: "list"
            summary: "{{fields.sector}} — {{fields.metricBig}}"
            fields:
              - { name: "id",         label: "Slug",          widget: "string", hint: "Lower-case, hyphens. Internal key, not shown. e.g. retail-velocity" }
              - { name: "sector",     label: "Sector / industry", widget: "string", hint: "e.g. Technology, Financial Services, Healthcare" }
              - { name: "problem",    label: "Problem statement", widget: "text",   hint: "One sentence describing the client's situation before Galent." }
              - { name: "metricBig",  label: "Big metric",    widget: "string", hint: "The headline number. e.g. 10×, 800%, 99.99%" }
              - { name: "metricDesc", label: "Metric description", widget: "text", hint: "The sentence that follows the big number. e.g. 'faster model deployment. Dev cycles from months to days.'" }

  # ----------------------------------------------------------------------
  # SERVICE PAGES — Outcomes stats per service. Single file containing all 8.
  # ----------------------------------------------------------------------
  - name: "services"
    label: "Service pages"
    label_singular: "Service outcomes"
    description: "Outcomes (stat-strip) shown on each of the 8 service pages. Edit the title and the stats per service. Numbers update quarterly."
    files:
      - name: "outcomes"
        label: "Service outcomes (all 8)"
        file: "src/content/services.json"
        description: "One section per service. Edit the title and the 4 stats."
        fields:
          - { name: "legacy",     label: "Legacy Modernisation",     widget: "object", collapsed: true, fields: [
              { name: "label",    label: "Service name (internal)",  widget: "string" },
              { name: "outcomes", label: "Outcomes",                  widget: "object", fields: [
                { name: "title", label: "Section title",              widget: "string", hint: "Supports <em class=\"ac-p\">…</em> for accent colour" },
                { name: "stats", label: "Stats", widget: "list", summary: "{{fields.value}}{{fields.unit}} — {{fields.label}}", fields: [
                  { name: "value", label: "Number", widget: "string", hint: "e.g. 15 or $9.3" },
                  { name: "unit",  label: "Unit",   widget: "string", required: false, hint: "e.g. ×, %, %+, M" },
                  { name: "label", label: "Label",  widget: "string" },
                  { name: "tint",  label: "Colour", widget: "select", options: ["p", "g", "o"], hint: "p=purple, g=green, o=orange" }
                ]},

              { name: "capabilities", label: "Key capabilities", widget: "object", fields: [
                { name: "title", label: "Section title", widget: "string", hint: "Supports <em class=ac-p>…</em> for accent" },
                { name: "items", label: "Capability cards", widget: "list", summary: "{{fields.num}} {{fields.title}}", fields: [
                  { name: "num",     label: "Number",  widget: "string", hint: "e.g. 4.1, 4.2" },
                  { name: "title",   label: "Title",   widget: "string" },
                  { name: "kicker",  label: "Kicker",  widget: "string", required: false },
                  { name: "bullets", label: "Bullets", widget: "list", field: { name: "bullet", label: "Bullet", widget: "string" } }
                ]}
              ]}
              ]}
            ] }
          - { name: "brownfield", label: "Brownfield & Greenfield",  widget: "object", collapsed: true, fields: [
